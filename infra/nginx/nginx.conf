# Reverse proxy for staging/prod (plan §13). Not wired into the dev compose yet —
# in Phase 0 the frontend and backend are reached on their own ports. Kept here so
# the routing contract (/, /api -> backend) is version-controlled from day one.
events {}

http {
  upstream backend  { server backend:8000; }
  upstream frontend { server frontend:5173; }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }
  }
}
