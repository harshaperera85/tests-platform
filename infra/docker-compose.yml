# Tests Platform — local dev stack. Promotion to EC2/AWS is configuration, not a
# rewrite (CLAUDE.md golden rule 7). Build contexts are relative to this file.
#
# Run from repo root:  docker compose -f infra/docker-compose.yml up --build
# (env defaults below; copy .env.example -> .env at repo root to override.)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tests}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tests}
      POSTGRES_DB: ${POSTGRES_DB:-tests}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tests}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tests:tests@postgres:5432/tests}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SCORING_R_URL: ${SCORING_R_URL:-http://scoring-r:8000}
      ORACLE_R_URL: ${ORACLE_R_URL:-http://oracle-r:8000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ASSEMBLY_ASYNC: ${ASSEMBLY_ASYNC:-true}
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apply migrations, then serve (baseline is empty in Phase 0).
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    # Same image/code as backend; consumes the RQ 'assembly' queue. Assembly
    # solves run here, not in the API request (plan §6/§7).
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://tests:tests@postgres:5432/tests}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ASSEMBLY_ASYNC: ${ASSEMBLY_ASYNC:-true}
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "rq worker --url $${REDIS_URL:-redis://redis:6379/0} assembly"

  scoring-r:
    build:
      context: ../engines/scoring-r
    restart: unless-stopped
    ports:
      - "8001:8000"

  # Read-only ATA cross-validation oracle (GPL: eatATA + lpSolve), kept SEPARATE
  # from scoring-r so the GPL oracle stays isolated. Never builds a deliverable
  # form — OR-Tools is the sole production assembler.
  oracle-r:
    build:
      # repo-root context: the Dockerfile copies backend/ + engines/oracle-r/.
      context: ..
      dockerfile: engines/oracle-r/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    environment:
      # Empty base URL -> same-origin; the Vite dev-server proxy forwards /api to
      # the backend service (no CORS, no backend change).
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
